// ─── MATH ─────────────────────────────────────────────────────────────────────
function amortize(price, trade, down, ratePct, years) {
  const financed = Math.max(0, price - trade - down);
  const n = Math.round(years * 12);
  const r = (ratePct / 100) / 12;
  let pmt = r === 0 ? (n > 0 ? financed / n : 0)
    : financed * (r * Math.pow(1+r,n)) / (Math.pow(1+r,n) - 1);
  const sched = [];
  let bal = financed;
  for (let i = 1; i <= n; i++) {
    const interest = bal * r;
    const principal = pmt - interest;
    bal = Math.max(0, bal - principal);
    sched.push({ n: i, principal, interest, balance: bal });
  }
  const totalPaid = pmt * n;
  const totalInterest = totalPaid - financed;
  return { financed, pmt, schedule: sched, totalPaid, totalInterest };
}
const $  = n => '$' + Math.round(n).toLocaleString();
const $2 = n => '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const $s = n => {
  const a = Math.abs(n);
  if (a >= 1e6) return '$' + (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (a >= 1e3) return '$' + (n/1e3).toFixed(1).replace(/\.0$/,'') + 'k';
  return '$' + Math.round(n);
};

// ─── HOOKS ────────────────────────────────────────────────────────────────────
function useCountUp(target, duration = 900, active = true) {
  const [val, setVal] = useState(0);
  const raf = useRef(null);
  const prev = useRef(0);
  useEffect(() => {
    if (!active) return;
    cancelAnimationFrame(raf.current);
    const from = prev.current;
    const start = Date.now();
    const tick = () => {
      const p = Math.min((Date.now() - start) / duration, 1);
      const e = 1 - Math.pow(1-p, 3);
      const cur = from + (target - from) * e;
      setVal(cur);
      prev.current = cur;
      if (p < 1) raf.current = requestAnimationFrame(tick);
    };
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
  }, [target, active]);
  return val;
}

// ─── DONUT ────────────────────────────────────────────────────────────────────
function Donut({ principal, interest, t }) {
  const total = principal + interest;
  const pRatio = total > 0 ? principal / total : 0.5;
  const R = 40, C = 2 * Math.PI * R;
  const pDash = C * pRatio;
  const iDash = C * (1 - pRatio);
  return (
    <svg width="110" height="110" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r={R} fill="none" stroke={t.surface}
        strokeWidth="12" opacity="0.6" />
      <circle cx="50" cy="50" r={R} fill="none" stroke={t.accent}
        strokeWidth="12"
        strokeDasharray={`${pDash} ${C - pDash}`}
        strokeDashoffset={0}
        strokeLinecap="round"
        transform="rotate(-90 50 50)"
        style={{ transition: 'stroke-dasharray 0.9s cubic-bezier(0.34,1.56,0.64,1)' }} />
      <circle cx="50" cy="50" r={R} fill="none" stroke={t.muted}
        strokeWidth="12" opacity="0.3"
        strokeDasharray={`${iDash} ${C - iDash}`}
        strokeDashoffset={-pDash}
        strokeLinecap="round"
        transform="rotate(-90 50 50)"
        style={{ transition: 'stroke-dasharray 0.9s cubic-bezier(0.34,1.56,0.64,1)', transitionDelay: '0.05s' }} />
    </svg>
  );
}

// ─── FIELD ────────────────────────────────────────────────────────────────────
function Field({ label, value, onChange, prefix, suffix, step = 1, min = 0, t, animDelay = '0s' }) {
  const [focused, setFocused] = useState(false);
  const [localVal, setLocalVal] = useState(String(value));

  // Keep localVal in sync when value changes externally (e.g. stress panel)
  useEffect(() => {
    if (!focused) setLocalVal(value === 0 ? '' : String(value));
  }, [value, focused]);

  const handleChange = e => {
    const raw = e.target.value;
    setLocalVal(raw);
    const n = parseFloat(raw);
    if (!isNaN(n)) onChange(n);
  };

  const handleBlur = () => {
    setFocused(false);
    const n = parseFloat(localVal);
    if (isNaN(n) || localVal === '') {
      setLocalVal('');
      onChange(0);
    } else {
      setLocalVal(String(n));
    }
  };
  return (
    <div style={{ position: 'relative', animation: `fieldFadeIn 0.35s ease ${animDelay} both` }}>
      {/* Focus highlight bar */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, height: 2,
        background: t.accent,
        borderRadius: '0 0 2px 2px',
        transform: focused ? 'scaleX(1)' : 'scaleX(0)',
        transformOrigin: 'left',
        transition: 'transform 0.22s cubic-bezier(0.4,0,0.2,1)',
        zIndex: 2,
      }} />
      <label style={{
        display: 'block', fontSize: 9, fontWeight: 600, letterSpacing: '0.8px',
        textTransform: 'uppercase', color: focused ? t.accentAlt : t.featMuted,
        marginBottom: 5, transition: 'color 0.15s',
      }}>{label}</label>
      <div style={{ position: 'relative' }}>
        {prefix && (
          <span style={{
            position: 'absolute', left: 0, top: '50%', transform: 'translateY(-50%)',
            fontSize: 18, color: t.featText, opacity: focused ? 0.7 : 0.35,
            pointerEvents: 'none', transition: 'opacity 0.15s', lineHeight: 1,
          }}>{prefix}</span>
        )}
        <input
          type="number" value={localVal} step={step} min={min}
          onChange={handleChange}
          onFocus={() => setFocused(true)}
          onBlur={handleBlur}
          style={{
            width: '100%', background: 'transparent', border: 'none', outline: 'none',
            padding: `0 ${suffix ? '28px' : '0'} 8px ${prefix ? '16px' : '0'}`,
            fontSize: 22, fontWeight: 400, color: t.featText, fontFamily: 'inherit',
            WebkitAppearance: 'none', appearance: 'none',
            fontVariantNumeric: 'tabular-nums',
            caretColor: t.accent,
          }}
        />
        {suffix && (
          <span style={{
            position: 'absolute', right: 0, bottom: 10,
            fontSize: 13, color: t.featText, opacity: focused ? 0.65 : 0.35,
            pointerEvents: 'none', transition: 'opacity 0.15s',
          }}>{suffix}</span>
        )}
      </div>
      {/* Bottom separator */}
      <div style={{ height: 0.5, background: `${t.accent}25`, marginTop: 0 }} />
    </div>
  );
}

// ─── CHART ────────────────────────────────────────────────────────────────────
function LoanChart({ schedule, t }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const [mode, setMode] = useState('balance');
  const [gran, setGran] = useState('year');

  useEffect(() => {
    if (!canvasRef.current || !schedule.length) return;
    const agg = gran === 'month'
      ? { labels: schedule.map(r => r.n), bal: schedule.map(r => r.balance), pp: schedule.map(r => r.principal), pi: schedule.map(r => r.interest) }
      : (() => {
          const y = {};
          schedule.forEach(r => { const k = Math.ceil(r.n/12); if (!y[k]) y[k]={p:0,i:0,b:0}; y[k].p+=r.principal; y[k].i+=r.interest; y[k].b=r.balance; });
          const ks = Object.keys(y);
          return { labels: ks.map(k=>'Yr '+k), bal: ks.map(k=>y[k].b), pp: ks.map(k=>y[k].p), pi: ks.map(k=>y[k].i) };
        })();
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current.getContext('2d'), {
      type: 'bar',
      data: {
        labels: agg.labels,
        datasets: mode === 'balance'
          ? [{ label: 'Balance', data: agg.bal, backgroundColor: t.text === '#ede8d8' ? t.surface : t.featBg, borderWidth: 0, borderRadius: 3, maxBarThickness: 30 }]
          : [
              { label: 'Principal', data: agg.pp, backgroundColor: t.text === '#ede8d8' ? t.muted : t.featBg, borderWidth: 0, borderRadius: [3,3,0,0], maxBarThickness: 30, stack: 's' },
              { label: 'Interest', data: agg.pi, backgroundColor: t.accent, borderWidth: 0, borderRadius: [3,3,0,0], maxBarThickness: 30, stack: 's' },
            ]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: { duration: 350 },
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: t.featBg, titleColor: t.accent, bodyColor: t.text === '#ede8d8' ? '#ede8d8' : '#fff', borderColor: t.accent, borderWidth: 0.5, padding: 10, callbacks: { label: c => c.dataset.label + ': ' + $(c.parsed.y) } }
        },
        scales: {
          x: { stacked: mode==='split', ticks: { color: t.muted, font: { size: 10 } }, grid: { display: false }, border: { color: t.surfaceBorder } },
          y: { stacked: mode==='split', ticks: { color: t.muted, font: { size: 10 }, callback: v => $s(v) }, grid: { color: 'rgba(180,180,180,0.18)' }, border: { display: false } }
        }
      }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [schedule, mode, gran, t]);

  const Seg = ({ label, active, onClick }) => (
    <button onClick={onClick} style={{
      flex: 1, background: active ? t.featBg : 'transparent', border: 'none',
      padding: '7px 8px', fontSize: 10, fontWeight: 500, color: active ? t.accent : t.muted,
      cursor: 'pointer', letterSpacing: '0.4px', textTransform: 'uppercase',
      fontFamily: 'inherit', borderRadius: 7, transition: 'background 0.15s, color 0.15s',
    }}>{label}</button>
  );

  return (
    <div style={{ padding: '0 22px 16px' }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 10 }}>
        {[[['balance','Balance'],['split','Principal + Interest']],[['year','Yearly'],['month','Monthly']]].map((pair, pi) => (
          <div key={pi} style={{ display: 'flex', background: t.surface, border: `0.5px solid ${t.surfaceBorder}`, borderRadius: 9, padding: 2 }}>
            {pair.map(([k,l]) => <Seg key={k} label={l} active={pi===0 ? mode===k : gran===k} onClick={() => pi===0 ? setMode(k) : setGran(k)} />)}
          </div>
        ))}
      </div>
      <div style={{ background: t.body, border: `0.5px solid ${t.surfaceBorder}`, borderRadius: 11, padding: '12px 8px 8px', height: 220 }}>
        <canvas ref={canvasRef} />
      </div>
      <div style={{ display: 'flex', justifyContent: 'center', gap: 16, marginTop: 8, fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.4px', color: t.muted, fontWeight: 600 }}>
        {mode === 'balance'
          ? <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: t.text === '#ede8d8' ? t.surface : t.featBg, display: 'inline-block' }} /> Remaining balance</span>
          : <><span style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: t.text === '#ede8d8' ? t.muted : t.featBg, display: 'inline-block' }} /> Principal</span>
              <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: t.accent, display: 'inline-block' }} /> Interest</span></>
        }
      </div>
    </div>
  );
}

// ─── SCHEDULE TABLE ───────────────────────────────────────────────────────────
function ScheduleTable({ schedule, t }) {
  const rows = (() => {
    const y = {};
    schedule.forEach(r => { const k = Math.ceil(r.n/12); if (!y[k]) y[k]={p:0,i:0,b:0}; y[k].p+=r.principal; y[k].i+=r.interest; y[k].b=r.balance; });
    return Object.entries(y).map(([k, d]) => ({ label: 'Yr '+k, p: d.p, i: d.i, b: d.b }));
  })();
  return (
    <div style={{ padding: '0 22px 28px' }}>
      <div style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.6px', color: t.muted, fontWeight: 600, marginBottom: 8 }}>Amortization</div>
      <div style={{ border: `0.5px solid ${t.surfaceBorder}`, borderRadius: 11, overflow: 'hidden', maxHeight: 280, overflowY: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12, tableLayout: 'fixed', fontVariantNumeric: 'tabular-nums' }}>
          <thead style={{ position: 'sticky', top: 0 }}>
            <tr style={{ background: t.tableHead }}>
              {['#','Principal','Interest','Balance'].map((h,i) => (
                <th key={h} style={{ padding: '9px 10px', textAlign: i===0?'left':'right', color: t.tableHeadText, fontSize: 9, letterSpacing: '0.5px', textTransform: 'uppercase', fontWeight: 500 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((r, i) => (
              <tr key={i} style={{ background: i%2===0 ? t.surface : 'transparent', borderBottom: `0.5px solid ${t.surfaceBorder}` }}>
                <td style={{ padding: '8px 10px', color: t.text, fontWeight: 500 }}>{r.label}</td>
                <td style={{ padding: '8px 10px', textAlign: 'right', color: t.text }}>{$(r.p)}</td>
                <td style={{ padding: '8px 10px', textAlign: 'right', color: t.accent }}>{$(r.i)}</td>
                <td style={{ padding: '8px 10px', textAlign: 'right', color: t.text }}>{$(r.b)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── STRESS PANEL ─────────────────────────────────────────────────────────────
const STEPS = 20;
const VCFG = {
  amount: { rangeFor: b=>[b*.5,b*1.5], snap: v=>Math.round(v/100)*100, label: v=>$s(v), bigLabel: v=>$(v), tickMin: b=>$s(b*.5), tickMax: b=>$s(b*1.5), title: 'Purchase price', col: 'Price' },
  trade:  { rangeFor: b=>[0,b>0?b*2:20000], snap: v=>Math.round(v/100)*100, label: v=>$s(v), bigLabel: v=>$(v), tickMin: ()=>'$0', tickMax: b=>$s(b>0?b*2:20000), title: 'Trade-in value', col: 'Trade' },
  down:   { rangeFor: b=>[0,b>0?b*3:20000], snap: v=>Math.round(v/100)*100, label: v=>$s(v), bigLabel: v=>$(v), tickMin: ()=>'$0', tickMax: b=>$s(b>0?b*3:20000), title: 'Down payment', col: 'Down' },
  rate:   { rangeFor: b=>[Math.max(0,b-3),b+3], snap: v=>Math.round(v*8)/8, label: v=>v.toFixed(3).replace(/\.?0+$/,'')+'%', bigLabel: v=>v.toFixed(3).replace(/\.?0+$/,'')+'%', tickMin: b=>(Math.max(0,b-3)).toFixed(2).replace(/\.?0+$/,'')+'%', tickMax: b=>(b+3).toFixed(2).replace(/\.?0+$/,'')+'%', title: 'Interest rate', col: 'Rate' },
  term:   { rangeFor: b=>[1,Math.min(30,Math.max(b+1,b*2))], snap: v=>Math.max(1,Math.round(v)), label: v=>Math.round(v)+'yr'+(Math.round(v)===1?'':'s'), bigLabel: v=>Math.round(v)+' yr'+(Math.round(v)===1?'':'s'), tickMin: ()=>'1 yr', tickMax: b=>Math.min(30,Math.max(b+1,b*2))+' yrs', title: 'Loan term', col: 'Term' },
};

function StressPanel({ varName, inputs, t, glow, serifHeadings }) {
  const cfg = VCFG[varName];
  const [idx, setIdx] = useState(STEPS/2);
  const [mn, mx] = cfg.rangeFor(inputs[varName]);
  const valueAt = i => cfg.snap(mn + (mx-mn) * (i/STEPS));
  const curVal = valueAt(idx);
  const curInputs = {
    amount: varName==='amount' ? curVal : inputs.amount,
    trade:  varName==='trade'  ? curVal : inputs.trade,
    down:   varName==='down'   ? curVal : inputs.down,
    rate:   varName==='rate'   ? curVal : inputs.rate,
    term:   varName==='term'   ? curVal : inputs.term,
  };
  const run = inp => amortize(inp.amount, inp.trade, inp.down, inp.rate, inp.term);
  const curRes = run(curInputs);
  const baseRes = run(inputs);
  const delta = curRes.pmt - baseRes.pmt;

  const scenarios = useMemo(() => Array.from({length:STEPS+1},(_,i)=>{
    const v = valueAt(i);
    const inp = { ...inputs, [varName]: v };
    return { i, v, ...run(inp) };
  }), [varName, JSON.stringify(inputs)]);

  const pct = idx / STEPS * 100;

  // All 6 params for the strip — swept one shows current value and is highlighted
  const allParams = [
    { l: 'Price',    v: varName==='amount' ? cfg.bigLabel(curVal) : $(inputs.amount),             swept: varName==='amount' },
    { l: 'Trade-in', v: varName==='trade'  ? cfg.bigLabel(curVal) : $(inputs.trade),              swept: varName==='trade'  },
    { l: 'Down',     v: varName==='down'   ? cfg.bigLabel(curVal) : $(inputs.down),               swept: varName==='down'   },
    { l: 'Rate',     v: varName==='rate'   ? cfg.bigLabel(curVal) : inputs.rate+'%',              swept: varName==='rate'   },
    { l: 'Term',     v: varName==='term'   ? cfg.bigLabel(curVal) : inputs.term+' yrs',           swept: varName==='term'   },
  ];

  return (
    <div style={{ paddingBottom: 28 }}>
      <div style={{ padding: '18px 22px 10px' }}>
        <div style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.6px', color: t.muted, fontWeight: 600, marginBottom: 4 }}>Stress test</div>
        <div style={{ fontSize: 14, color: t.text, lineHeight: 1.5 }}>
          How does the loan change if the <span style={{ color: t.accent, fontWeight: 600 }}>{cfg.title.toLowerCase()}</span> moves?
        </div>
      </div>

      {/* Scrubber */}
      <div style={{ padding: '0 22px 14px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 10 }}>
          <div>
            <div style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.5px', color: t.muted, fontWeight: 600, marginBottom: 2 }}>{cfg.title}</div>
            <div style={{ fontSize: 28, fontWeight: 500, color: t.text, fontVariantNumeric: 'tabular-nums', lineHeight: 1 }}>{cfg.bigLabel(curVal)}</div>
          </div>
          <div style={{ fontSize: 12, fontWeight: 500, fontVariantNumeric: 'tabular-nums', color: Math.abs(delta)<0.5 ? t.muted : delta>0 ? t.danger : t.green }}>
            {Math.abs(delta)<0.5 ? 'baseline' : (delta>0?'+':'−') + $(Math.abs(delta)) + '/mo'}
          </div>
        </div>
        <style>{`
          .stress-range-${varName}::-webkit-slider-thumb { background: ${t.thumb} !important; border: 2px solid ${t.accent} !important; box-shadow: ${glow ? '0 0 8px '+t.accent+'60' : 'none'} !important; }
          .stress-range-${varName}::-moz-range-thumb { background: ${t.thumb} !important; border: 2px solid ${t.accent} !important; }
        `}</style>
        <input type="range" className={`stress-range-${varName}`} min={0} max={STEPS} value={idx} step={1}
          onChange={e => setIdx(parseInt(e.target.value))}
          style={{ background: `linear-gradient(to right, ${t.accent} ${pct}%, ${t.rangeBg} ${pct}%)` }} />
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 9, color: t.muted, marginTop: 4 }}>
          <span>{cfg.tickMin(inputs[varName])}</span><span>baseline</span><span>{cfg.tickMax(inputs[varName])}</span>
        </div>
      </div>

      {/* Animated summary */}
      <InlineSummary res={curRes} inputs={curInputs} t={t} serif={serifHeadings} glow={glow} animKey={idx} baseRes={baseRes} />

      {/* All-params strip */}
      <div style={{ margin: '12px 22px 16px', background: t.featBg, border: `0.5px solid ${t.accent}40`, borderRadius: 12, padding: '14px 16px', boxShadow: glow ? `0 4px 20px ${t.accent}18` : 'none' }}>
        <div style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.6px', color: t.featMuted, fontWeight: 600, marginBottom: 10 }}>Loan parameters</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: '4px 6px' }}>
          {allParams.map(({ l, v, swept }) => (
            <div key={l} style={{
              padding: '8px 10px', borderRadius: 8,
              background: swept ? t.accent : 'transparent',
              border: `0.5px solid ${swept ? t.accent : t.accent+'20'}`,
            }}>
              <div style={{ fontSize: 8, textTransform: 'uppercase', letterSpacing: '0.4px', color: swept ? t.ctaText : t.featMuted, fontWeight: 700, marginBottom: 3, opacity: swept ? 0.75 : 1 }}>{l}</div>
              <div style={{ fontSize: 11, fontWeight: 600, color: swept ? t.ctaText : t.featText, fontVariantNumeric: 'tabular-nums' }}>{v}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Table */}
      <div style={{ padding: '0 22px' }}>
        <div style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.5px', color: t.muted, fontWeight: 600, marginBottom: 8 }}>Scenarios</div>
        <div style={{ border: `0.5px solid ${t.surfaceBorder}`, borderRadius: 10, overflow: 'hidden' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11, tableLayout: 'fixed', fontVariantNumeric: 'tabular-nums' }}>
            <thead>
              <tr style={{ background: t.tableHead }}>
                {[cfg.col,'Financed','Payment','Interest','Total'].map((h,i) => (
                  <th key={h} style={{ padding: '8px 6px', textAlign: i===0?'left':'right', color: t.tableHeadText, fontSize: 9, letterSpacing: '0.4px', textTransform: 'uppercase', fontWeight: 500 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {scenarios.map(({ i, v, financed, pmt, totalInterest, totalPaid }) => {
                const isBase = i === STEPS/2, isCur = i === idx;
                return (
                  <tr key={i} onClick={() => setIdx(i)} style={{
                    cursor: 'pointer', borderBottom: `0.5px solid ${t.surfaceBorder}`,
                    background: isCur ? t.accent : isBase ? t.tableHead : i%2===0 ? t.surface : 'transparent',
                    transition: 'background 0.12s',
                  }}>
                    {[cfg.label(v),$s(financed),$s(pmt),$s(totalInterest),$s(totalPaid)].map((val,j) => (
                      <td key={j} style={{ padding: '8px 6px', textAlign: j===0?'left':'right', color: isCur ? t.ctaText : isBase ? t.accent : t.text, fontWeight: isCur||isBase ? 600 : 400 }}>{val}</td>
                    ))}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

          <span style={{ fontSize: 11, color: '#1a2942' }}>{label}</span>

            width: 38, height: 22, borderRadius: 11, border: 'none', cursor: 'pointer',
            background: tweaks[key] ? '#C9A961' : 'rgba(26,41,66,0.15)',
            position: 'relative', transition: 'background 0.2s', flexShrink: 0,
          }}>
            <div style={{
              position: 'absolute', top: 3, left: tweaks[key] ? 19 : 3,
              width: 16, height: 16, borderRadius: '50%', background: '#fff',
              transition: 'left 0.18s', boxShadow: '0 1px 4px rgba(0,0,0,0.2)',
            }} />
          </button>
        </div>
      ))}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
const TABS = ['Calculator','Rate','Price','Trade-in','Down','Term'];
const VARS = [null,'rate','amount','trade','down','term'];

function App() {
  const saved = JSON.parse(localStorage.getItem('jefe_state') || '{}');
  const [tweaks, setTweaks] = useState({ ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('jefe_tweaks') || '{}') });
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [activeTab, setActiveTab] = useState(saved.tab || 0);
  const [animKey, setAnimKey] = useState(0);
  const [inputs, setInputs] = useState({
    amount: saved.amount || 55000,
    trade:  saved.trade  || 15000,
    down:   saved.down   || 5000,
    rate:   saved.rate   || 7.25,
    term:   saved.term   || 6,
  });

  const t = THEMES[tweaks.theme] || THEMES.navy;
  const headFont = tweaks.serifHeadings ? "'DM Serif Display', serif" : "'DM Sans', sans-serif";
  const glow = tweaks.accentGlow;

  const res = useMemo(() => amortize(inputs.amount, inputs.trade, inputs.down, inputs.rate, inputs.term), [inputs]);

  const setInput = (k, v) => { setInputs(p => ({ ...p, [k]: v })); setAnimKey(n => n + 1); };

  useEffect(() => {
    localStorage.setItem('jefe_state', JSON.stringify({ ...inputs, tab: activeTab }));
  }, [inputs, activeTab]);

  useEffect(() => {
    localStorage.setItem('jefe_tweaks', JSON.stringify(tweaks));
  }, [tweaks]);

  const onTweakChange = (k, v) => {
    setTweaks(p => {
      const next = { ...p, [k]: v };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
      return next;
    });
  };

  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const panelsRef = useRef(null);
  const tabBarRef = useRef(null);

  const goToTab = useCallback((idx) => {
    setActiveTab(idx);
    if (panelsRef.current) panelsRef.current.scrollTo({ left: idx * panelsRef.current.clientWidth, behavior: 'smooth' });
    const pill = tabBarRef.current?.children[idx];
    if (pill) pill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
  }, []);

  useEffect(() => {
    const el = panelsRef.current;
    if (!el) return;
    let timer;
    const fn = () => { clearTimeout(timer); timer = setTimeout(() => { setActiveTab(Math.round(el.scrollLeft / el.clientWidth)); }, 80); };
    el.addEventListener('scroll', fn, { passive: true });
    return () => el.removeEventListener('scroll', fn);
  }, []);

  const pmtLabel = isFinite(res.pmt) ? $2(res.pmt) + '/mo' : '—';

  return (
    <div style={{ width: '100%', maxWidth: 480, height: '100%', background: t.shell, display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden' }}>

      {/* Header */}

        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>

            width: 44, height: 44, borderRadius: 10, flexShrink: 0,
            objectFit: 'contain', background: `${t.accent}15`,
            boxShadow: glow ? `0 0 16px ${t.accent}30` : 'none',
          }} />
          <div>
            <div style={{ fontSize: 9, letterSpacing: '1.8px', textTransform: 'uppercase', color: t.accentAlt, opacity: 0.85, marginBottom: 1, fontWeight: 500 }}>Jefe Bank</div>
            <h1 style={{ fontFamily: headFont, fontSize: 18, fontWeight: 400, color: t.headerText, margin: 0, lineHeight: 1.1 }}>Loan Calculator</h1>
          </div>

        </div>
      </div>

      {/* Tab bar */}
      <div ref={tabBarRef} className="no-scroll" style={{ background: t.tabBg, padding: '0 14px 10px', display: 'flex', gap: 6, overflowX: 'auto', flexShrink: 0, WebkitOverflowScrolling: 'touch' }}>
        {TABS.map((label, i) => (
          <button key={i} onClick={() => goToTab(i)} style={{
            background: activeTab===i ? t.tabActive : 'transparent',
            border: `0.5px solid ${activeTab===i ? t.tabActive : t.tabBorder}`,
            color: activeTab===i ? t.tabActiveText : t.tabText,
            padding: '7px 14px', fontSize: 10, fontWeight: 600, letterSpacing: '0.5px',
            textTransform: 'uppercase', borderRadius: 999, cursor: 'pointer',
            whiteSpace: 'nowrap', fontFamily: 'inherit',
            transition: 'background 0.15s, color 0.15s, border-color 0.15s',
            WebkitTapHighlightColor: 'transparent',
          }}>{label}</button>
        ))}
      </div>

      {/* Panels */}
      <div ref={panelsRef} className="no-scroll" style={{ flex: '1 1 0', minHeight: 0, display: 'flex', overflowX: 'auto', overflowY: 'hidden', scrollSnapType: 'x mandatory', scrollBehavior: 'smooth', WebkitOverflowScrolling: 'touch' }}>

            <div style={{
              position: 'absolute', top: 0, left: 0, right: 0, height: 1,
              background: `linear-gradient(90deg, transparent 0%, ${t.accent} 50%, transparent 100%)`,
              backgroundSize: '200% 100%',
              animation: 'shimmer 3.5s ease-in-out infinite',
            }} />
            <Field label="Purchase price" value={inputs.amount} onChange={v=>setInput('amount',v)} prefix="$" step={500} t={t} animDelay="0s" />
            <div style={{ height: 16 }} />
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
              <Field label="Trade-in" value={inputs.trade} onChange={v=>setInput('trade',v)} prefix="$" step={500} t={t} animDelay="0.04s" />
              <Field label="Down payment" value={inputs.down} onChange={v=>setInput('down',v)} prefix="$" step={500} t={t} animDelay="0.08s" />
            </div>
            <div style={{ height: 16 }} />
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
              <Field label="Interest rate" value={inputs.rate} onChange={v=>setInput('rate',v)} suffix="%" step={0.125} t={t} animDelay="0.12s" />
              <Field label="Term" value={inputs.term} onChange={v=>setInput('term',v)} suffix="yrs" step={1} min={1} t={t} animDelay="0.16s" />
            </div>
            <div style={{ height: 12 }} />
          </div>

          {/* Inline animated summary */}
          {tweaks.animatedSummary && res.schedule.length > 0 && (
            <InlineSummary res={res} inputs={inputs} t={t} serif={tweaks.serifHeadings} glow={glow} animKey={animKey} />
          )}

          {/* Stats (shown when animated summary is off) */}
          {!tweaks.animatedSummary && (
            <div style={{ padding: '14px 22px 0', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              <StatCard label="Monthly payment" value={isFinite(res.pmt) ? $2(res.pmt) : '$0.00'} featured t={t} glow={glow} />
              <StatCard label="Amount financed" value={$(res.financed)} t={t} />
              <StatCard label="Total interest" value={$(res.totalInterest)} t={t} />
              <StatCard label="Total paid" value={$(res.totalPaid)} t={t} />
            </div>
          )}

          {/* Chart + table */}
          {res.schedule.length > 0 && <><div style={{ marginTop: 16 }}><LoanChart schedule={res.schedule} t={t} /></div><ScheduleTable schedule={res.schedule} t={t} /></>}
          {res.schedule.length === 0 && <div style={{ padding: '32px 22px', textAlign: 'center', color: t.muted, fontSize: 13 }}>Enter values above to see amortization.</div>}
        </div>

        {/* Stress tabs */}
        {VARS.slice(1).map(v => (
          <div key={v} style={{ flex: '0 0 100%', overflowY: 'auto', overflowX: 'hidden', scrollSnapAlign: 'start', scrollSnapStop: 'always', background: t.body }}>
            <StressPanel varName={v} inputs={inputs} t={t} glow={glow} serifHeadings={tweaks.serifHeadings} />
          </div>
        ))}
      </div>



      {/* Tweaks panel */}
      <TweaksPanel tweaks={tweaks} onChange={onTweakChange} visible={tweaksVisible} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
